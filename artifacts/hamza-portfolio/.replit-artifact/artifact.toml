kind = "web"
previewPath = "/"
title = "HAMZA POWERPLAYER — Portfolio"
version = "1.0.0"
id = "artifacts/hamza-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19728

[services.development]
run = "pnpm --filter @workspace/hamza-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hamza-portfolio", "run", "build" ]
publicDir = "artifacts/hamza-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19728"
BASE_PATH = "/"
